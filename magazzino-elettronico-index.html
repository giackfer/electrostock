<style>
  :root {
    --bg: #0a0f1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e3a5f;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --accent3: #39ff14;
    --text: #e2e8f0;
    --text-dim: #64748b;
    --danger: #ff3b5c;
    --warn: #ffc300;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Exo 2', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* GRID BACKGROUND */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,.03) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
    z-index: 0;
  }

  #app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; }

  /* HEADER */
  header {
    padding: 16px 16px 0;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-mark {
    width: 36px; height: 36px;
    border: 2px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    position: relative;
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    background: rgba(0,212,255,.1);
  }
  .logo-mark::before {
    content: '⚡';
    font-size: 16px;
  }
  .logo-text {
    font-family: var(--mono);
    font-size: 20px;
    color: var(--accent);
    letter-spacing: 2px;
  }
  .logo-sub {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-left: auto;
    font-family: var(--mono);
  }

  /* TABS */
  .tabs {
    display: flex;
    padding: 14px 16px 0;
    gap: 4px;
    border-bottom: 1px solid var(--border);
    margin-top: 12px;
  }
  .tab {
    flex: 1; padding: 8px 4px;
    background: none; border: none;
    color: var(--text-dim);
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all .2s;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:not(.active):hover { color: var(--text); }

  /* PAGES */
  .page { display: none; padding: 14px 16px 100px; }
  .page.active { display: block; }

  /* SECTION TITLE */
  .section-title {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  /* SEARCH */
  .search-box {
    position: relative;
    margin-bottom: 14px;
  }
  .search-box input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px 10px 38px;
    border-radius: 8px;
    font-family: var(--sans);
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-box::before {
    content: '🔍';
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    pointer-events: none;
  }

  /* COMPONENT CARD */
  .comp-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: border-color .2s;
  }
  .comp-card:hover { border-color: rgba(0,212,255,.4); }
  .comp-cat {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    background: rgba(0,212,255,.08);
    border: 1px solid rgba(0,212,255,.2);
  }
  .comp-info { flex: 1; min-width: 0; }
  .comp-name {
    font-weight: 600;
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .comp-detail {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .comp-qty-wrap {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
  }
  .comp-qty {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 700;
    line-height: 1;
  }
  .comp-qty.ok { color: var(--accent3); }
  .comp-qty.low { color: var(--warn); }
  .comp-qty.zero { color: var(--danger); }
  .comp-unit {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
    font-family: var(--mono);
  }
  .comp-actions {
    display: flex;
    gap: 4px;
    margin-top: 4px;
  }
  .qty-btn {
    width: 26px; height: 26px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  .qty-btn:active { transform: scale(.9); }
  .qty-btn.plus { border-color: rgba(57,255,20,.3); color: var(--accent3); }
  .qty-btn.minus { border-color: rgba(255,59,92,.3); color: var(--danger); }
  .del-btn {
    width: 26px; height: 26px;
    border-radius: 6px;
    border: 1px solid rgba(255,59,92,.3);
    background: rgba(255,59,92,.08);
    color: var(--danger);
    font-size: 12px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  .del-btn:active { transform: scale(.9); }

  /* FORM */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .form-row { margin-bottom: 10px; }
  .form-row label {
    display: block;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 5px;
    font-family: var(--mono);
  }
  .form-row input, .form-row select, .form-row textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 12px;
    border-radius: 8px;
    font-family: var(--sans);
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
  }
  .form-row input:focus, .form-row select:focus, .form-row textarea:focus {
    border-color: var(--accent);
  }
  .form-row select option { background: var(--surface2); }
  .form-row textarea { resize: none; height: 70px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* BUTTONS */
  .btn {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all .2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #0099bb);
    color: #000;
  }
  .btn-secondary {
    background: linear-gradient(135deg, var(--accent2), #cc5522);
    color: #fff;
  }
  .btn-danger {
    background: linear-gradient(135deg, var(--danger), #cc2244);
    color: #fff;
  }
  .btn-ghost {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
  }

  /* CIRCUIT CARDS */
  .circuit-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color .2s;
  }
  .circuit-card:hover { border-color: rgba(255,107,53,.4); }
  .circuit-header {
    display: flex;
    align-items: center;
    padding: 12px 14px;
    gap: 12px;
    cursor: pointer;
  }
  .circuit-icon {
    width: 38px; height: 38px;
    border-radius: 8px;
    background: rgba(255,107,53,.1);
    border: 1px solid rgba(255,107,53,.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .circuit-name {
    flex: 1;
    font-weight: 700;
    font-size: 15px;
  }
  .circuit-meta {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .circuit-chevron {
    color: var(--text-dim);
    transition: transform .2s;
    font-size: 12px;
  }
  .circuit-card.open .circuit-chevron { transform: rotate(90deg); }
  .circuit-body {
    display: none;
    padding: 0 14px 14px;
    border-top: 1px solid var(--border);
  }
  .circuit-card.open .circuit-body { display: block; }
  .circuit-ingredient {
    display: flex;
    align-items: center;
    padding: 6px 0;
    gap: 8px;
    border-bottom: 1px solid rgba(30,58,95,.5);
    font-size: 13px;
  }
  .circuit-ingredient:last-child { border-bottom: none; }
  .ci-qty {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    min-width: 28px;
    text-align: right;
  }
  .ci-name { flex: 1; }
  .ci-avail {
    font-family: var(--mono);
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 4px;
  }
  .ci-avail.ok { background: rgba(57,255,20,.1); color: var(--accent3); }
  .ci-avail.low { background: rgba(255,195,0,.1); color: var(--warn); }
  .ci-avail.no { background: rgba(255,59,92,.1); color: var(--danger); }
  .circuit-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .circuit-actions .btn { flex: 1; }

  /* ALERT TOAST */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transition: all .3s;
    z-index: 1000;
    white-space: nowrap;
    max-width: 320px;
    text-align: center;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .toast.success { border-color: var(--accent3); color: var(--accent3); }
  .toast.error { border-color: var(--danger); color: var(--danger); }
  .toast.warn { border-color: var(--warn); color: var(--warn); }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: rgba(10,15,26,.95);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-btn {
    flex: 1;
    padding: 10px 4px 8px;
    border: none;
    background: none;
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    transition: color .2s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn .nav-icon { font-size: 20px; }
  .nav-btn .nav-label { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; font-family: var(--mono); }

  /* STATS ROW */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 14px;
  }
  .stat-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    text-align: center;
  }
  .stat-val {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }
  .stat-label {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: none;
    align-items: flex-end;
    padding: 0;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    padding: 20px 16px 32px;
    width: 100%;
    max-height: 90dvh;
    overflow-y: auto;
    animation: slideUp .3s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 16px;
  }
  .modal-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 16px;
    color: var(--accent2);
    font-family: var(--mono);
  }

  /* INGREDIENT BUILDER */
  .ing-list { margin-bottom: 12px; }
  .ing-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
    align-items: center;
  }
  .ing-row select { flex: 1; }
  .ing-row input { width: 64px; flex-shrink: 0; }
  .ing-row .del-btn { flex-shrink: 0; }

  /* LOG */
  .log-entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 6px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .log-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-top: 4px;
    flex-shrink: 0;
  }
  .log-dot.in { background: var(--accent3); }
  .log-dot.out { background: var(--accent2); }
  .log-dot.err { background: var(--danger); }
  .log-text { flex: 1; font-size: 13px; }
  .log-time { font-family: var(--mono); font-size: 10px; color: var(--text-dim); margin-top: 3px; }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; }

  /* CATEGORY FILTER */
  .cat-filter {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
  }
  .cat-filter::-webkit-scrollbar { display: none; }
  .cat-chip {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    font-size: 11px;
    font-family: var(--mono);
    white-space: nowrap;
    cursor: pointer;
    transition: all .15s;
  }
  .cat-chip.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,212,255,.08);
  }

  .scan-area {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .scan-area input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 16px;
    outline: none;
    transition: border-color .2s;
    text-transform: uppercase;
  }
  .scan-area input:focus { border-color: var(--accent2); }
  .scan-area button {
    padding: 10px 16px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(135deg, var(--accent2), #cc5522);
    color: #fff;
    font-family: var(--sans);
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
  }

  ::placeholder { color: var(--text-dim); opacity: .5; }

  .badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 2px 7px;
    border-radius: 12px;
    font-size: 10px;
    font-family: var(--mono);
    font-weight: 700;
  }
  .badge-ok { background: rgba(57,255,20,.15); color: var(--accent3); }
  .badge-warn { background: rgba(255,195,0,.15); color: var(--warn); }
  .badge-no { background: rgba(255,59,92,.15); color: var(--danger); }

  .qty-input-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .qty-input-row input {
    width: 70px;
    text-align: center;
    font-family: var(--mono);
    font-size: 18px;
  }

  /* EDIT BTN */
  .edit-btn {
    width: 26px; height: 26px;
    border-radius: 6px;
    border: 1px solid rgba(0,212,255,.3);
    background: rgba(0,212,255,.08);
    color: var(--accent);
    font-size: 12px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  .edit-btn:active { transform: scale(.9); }

  /* CAT MANAGER */
  .cat-manage-row {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px; margin-bottom: 7px;
  }
  .cat-manage-icon { font-size: 20px; min-width: 28px; text-align: center; }
  .cat-manage-name { flex: 1; font-size: 14px; }

<script>
// ─── SUPABASE CONFIG ───────────────────────────────────────────────────────
const SB_URL = 'https://hlqvccgtonwufgqvooup.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhscXZjY2d0b253dWZncXZvb3VwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3OTE0MjIsImV4cCI6MjA5MTM2NzQyMn0.THSCJJO_a5UiUkwsU-Y-lX4w8ioKkzdMm3JasplC7BY';
const SB_ROW = 1; // riga unica nel database

async function sbGet() {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/electrostock?id=eq.${SB_ROW}&select=data`, {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    });
    const rows = await r.json();
    if (rows && rows.length > 0 && rows[0].data) return rows[0].data;
    return null;
  } catch(e) { return null; }
}

async function sbSet(data) {
  // Try update first
  const upd = await fetch(`${SB_URL}/rest/v1/electrostock?id=eq.${SB_ROW}`, {
    method: 'PATCH',
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
    body: JSON.stringify({ data })
  });
  if (upd.status === 404 || upd.status === 406) {
    // Insert if not exists
    await fetch(`${SB_URL}/rest/v1/electrostock`, {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ id: SB_ROW, data })
    });
  }
}

// ─── DATA ──────────────────────────────────────────────────────────────────
let inventory = [];
let circuits = [];
let log = [];
let nextId = 1;
let activeFilter = 'all';
let qtyModalTarget = null;
let editModalTarget = null;
let customCats = [];
let syncPending = false;
let syncTimer = null;

function save() {
  // Save locally as backup
  localStorage.setItem('es_inventory', JSON.stringify(inventory));
  localStorage.setItem('es_circuits', JSON.stringify(circuits));
  localStorage.setItem('es_log', JSON.stringify(log));
  localStorage.setItem('es_nextId', String(nextId));
  localStorage.setItem('es_customCats', JSON.stringify(customCats));
  // Debounce cloud sync
  clearTimeout(syncTimer);
  syncTimer = setTimeout(syncToCloud, 800);
}

async function syncToCloud() {
  showSyncStatus('syncing');
  const data = { inventory, circuits, log, nextId, customCats };
  try {
    await sbSet(data);
    showSyncStatus('ok');
  } catch(e) {
    showSyncStatus('err');
  }
}

async function loadFromCloud() {
  showSyncStatus('syncing');
  const data = await sbGet();
  if (data) {
    inventory = data.inventory || [];
    circuits = data.circuits || [];
    log = data.log || [];
    nextId = data.nextId || (inventory.length + circuits.length + 10);
    customCats = data.customCats || [];
    // Also save locally as backup
    localStorage.setItem('es_inventory', JSON.stringify(inventory));
    localStorage.setItem('es_circuits', JSON.stringify(circuits));
    localStorage.setItem('es_log', JSON.stringify(log));
    localStorage.setItem('es_nextId', String(nextId));
    localStorage.setItem('es_customCats', JSON.stringify(customCats));
    showSyncStatus('ok');
    return true;
  } else {
    // Fallback to localStorage
    inventory = JSON.parse(localStorage.getItem('es_inventory') || '[]');
    circuits = JSON.parse(localStorage.getItem('es_circuits') || '[]');
    log = JSON.parse(localStorage.getItem('es_log') || '[]');
    nextId = parseInt(localStorage.getItem('es_nextId') || '1');
    customCats = JSON.parse(localStorage.getItem('es_customCats') || '[]');
    showSyncStatus('offline');
    return false;
  }
}

function showSyncStatus(s) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  const map = {
    syncing: ['🔄', '#ffc300', 'Sincronizzazione...'],
    ok:      ['☁️', '#39ff14', 'Sincronizzato'],
    err:     ['⚠️', '#ff3b5c', 'Errore sync'],
    offline: ['📴', '#64748b', 'Offline']
  };
  const [icon, color, label] = map[s] || map.offline;
  el.innerHTML = `<span style="color:${color};font-family:'Share Tech Mono',monospace;font-size:10px;">${icon} ${label}</span>`;
}

function addLog(type, msg) {
  log.unshift({ type, msg, ts: new Date().toLocaleString('it-IT') });
  if (log.length > 200) log.pop();
  save();
}

// ─── NAVIGATION ────────────────────────────────────────────────────────────
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  const tabs = document.querySelectorAll('.tab');
  const navBtns = document.querySelectorAll('.nav-btn');
  const map = { inv:0, circuits:1, add:2, log:3, cats:4 };
  if (map[id] !== undefined) {
    tabs[map[id]].classList.add('active');
    navBtns[map[id]].classList.add('active');
  }
  if (id === 'inv') { renderInventory(); renderStats(); renderCatFilter(); }
  if (id === 'circuits') renderCircuits();
  if (id === 'log') renderLog();
  if (id === 'cats') { renderCatsPage(); }
}

// ─── TOAST ─────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ─── CAT ICONS ─────────────────────────────────────────────────────────────
const BASE_CAT_ICON = {
  resistore:'🔴', condensatore:'🔵', induttore:'🟡', transistor:'🟢',
  ic:'🟣', led:'🟠', connettore:'⚪', sensore:'🔷', modulo:'📡', altro:'⚫'
};
const BASE_CAT_NAMES = {
  resistore:'Resistori', condensatore:'Condensatori', induttore:'Induttori',
  transistor:'Transistor', ic:'IC/MCU', led:'LED/Display',
  connettore:'Connettori', sensore:'Sensori', modulo:'Moduli', altro:'Altro'
};
function getCatIcon(k) {
  if (BASE_CAT_ICON[k]) return BASE_CAT_ICON[k];
  const c = customCats.find(x => x.key === k);
  return c ? c.icon : '⚫';
}
function getCatName(k) {
  if (BASE_CAT_NAMES[k]) return BASE_CAT_NAMES[k];
  const c = customCats.find(x => x.key === k);
  return c ? c.name : k;
}
function allCatOptions() {
  const base = Object.entries(BASE_CAT_ICON).map(([k]) => ({key:k, icon:getCatIcon(k), name:getCatName(k)}));
  return [...base, ...customCats];
}

// ─── STATS ─────────────────────────────────────────────────────────────────
function renderStats() {
  const total = inventory.reduce((s,c) => s + c.qty, 0);
  const low = inventory.filter(c => c.qty > 0 && c.qty <= (c.min||5)).length;
  const zero = inventory.filter(c => c.qty === 0).length;
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-box">
      <div class="stat-val" style="color:var(--accent)">${inventory.length}</div>
      <div class="stat-label">Tipi</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" style="color:var(--warn)">${low}</div>
      <div class="stat-label">Scorta bassa</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" style="color:var(--danger)">${zero}</div>
      <div class="stat-label">Esauriti</div>
    </div>
  `;
}

// ─── CAT FILTER ────────────────────────────────────────────────────────────
function renderCatFilter() {
  const cats = ['all', ...new Set(inventory.map(c => c.cat))];
  const wrap = document.getElementById('cat-filter');
  wrap.innerHTML = cats.map(c => `
    <div class="cat-chip ${c === activeFilter ? 'active' : ''}" onclick="setFilter('${c}')">
      ${c === 'all' ? '🔍 Tutti' : (getCatIcon(c)||'•') + ' ' + getCatName(c)}
    </div>
  `).join('');
}
function setFilter(cat) {
  activeFilter = cat;
  renderCatFilter();
  renderInventory();
}

// ─── INVENTORY RENDER ──────────────────────────────────────────────────────
function renderInventory() {
  const q = document.getElementById('inv-search').value.toLowerCase();
  const list = inventory.filter(c => {
    const matchCat = activeFilter === 'all' || c.cat === activeFilter;
    const matchQ = !q || c.name.toLowerCase().includes(q) || (c.val||'').toLowerCase().includes(q) || (c.loc||'').toLowerCase().includes(q);
    return matchCat && matchQ;
  });
  const el = document.getElementById('inv-list');
  if (!list.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">Nessun componente trovato</div></div>';
    return;
  }
  el.innerHTML = list.map(c => {
    const qtyClass = c.qty === 0 ? 'zero' : c.qty <= (c.min||5) ? 'low' : 'ok';
    return `
    <div class="comp-card">
      <div class="comp-cat">${getCatIcon(c.cat)}</div>
      <div class="comp-info">
        <div class="comp-name">${c.name}</div>
        <div class="comp-detail">${c.val||''}${c.loc ? ' · 📍'+c.loc : ''}</div>
      </div>
      <div class="comp-qty-wrap">
        <div class="comp-qty ${qtyClass}">${c.qty}</div>
        <div class="comp-unit">pz</div>
        <div class="comp-actions">
          <button class="edit-btn" onclick="openEditModal(${c.id})">✏️</button>
          <button class="qty-btn plus" onclick="openQtyModal(${c.id})">±</button>
          <button class="del-btn" onclick="deleteComp(${c.id})">🗑</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ─── ADD COMPONENT ─────────────────────────────────────────────────────────
function addComponent() {
  const name = document.getElementById('f-name').value.trim();
  const qty = parseInt(document.getElementById('f-qty').value) || 0;
  const cat = document.getElementById('f-cat').value;
  const val = document.getElementById('f-val').value.trim();
  const min = parseInt(document.getElementById('f-min').value) || 5;
  const loc = document.getElementById('f-loc').value.trim();
  if (!name) { showToast('❌ Inserisci il nome!', 'error'); return; }
  inventory.push({ id: nextId++, name, qty, cat, val, min, loc });
  save();
  addLog('in', `Aggiunto: ${name} (${qty} pz)`);
  showToast(`✅ ${name} aggiunto!`);
  document.getElementById('f-name').value = '';
  document.getElementById('f-qty').value = '';
  document.getElementById('f-val').value = '';
  document.getElementById('f-loc').value = '';
  document.getElementById('f-min').value = '';
  renderStats();
  renderCatFilter();
}

function deleteComp(id) {
  const c = inventory.find(x => x.id === id);
  if (!c) return;
  if (!confirm(`Eliminare "${c.name}"?`)) return;
  inventory = inventory.filter(x => x.id !== id);
  save();
  addLog('err', `Eliminato: ${c.name}`);
  renderInventory(); renderStats(); renderCatFilter();
}

// ─── QTY MODAL ─────────────────────────────────────────────────────────────
function openQtyModal(id) {
  qtyModalTarget = id;
  const c = inventory.find(x => x.id === id);
  document.getElementById('qty-modal-title').textContent = c.name;
  document.getElementById('qty-modal-val').value = 1;
  document.getElementById('qty-modal').classList.add('open');
}
function closeQtyModal() {
  document.getElementById('qty-modal').classList.remove('open');
  qtyModalTarget = null;
}
function adjustQtyInput(d) {
  const inp = document.getElementById('qty-modal-val');
  inp.value = Math.max(0, parseInt(inp.value||0) + d);
}
function confirmQtyModal(op) {
  const c = inventory.find(x => x.id === qtyModalTarget);
  if (!c) return;
  const v = parseInt(document.getElementById('qty-modal-val').value) || 0;
  if (op === 'add') { c.qty += v; addLog('in', `+${v} ${c.name} → tot. ${c.qty}`); }
  else { if (c.qty < v) { showToast(`⚠️ Solo ${c.qty} disponibili!`, 'warn'); return; } c.qty -= v; addLog('out', `-${v} ${c.name} → tot. ${c.qty}`); }
  save();
  closeQtyModal();
  renderInventory(); renderStats();
  showToast(op === 'add' ? `✅ +${v} ${c.name}` : `📤 -${v} ${c.name}`);
}

// ─── CIRCUITS ──────────────────────────────────────────────────────────────
function renderCircuits() {
  const q = (document.getElementById('circuit-search').value||'').toLowerCase();
  const list = circuits.filter(c => !q || c.name.toLowerCase().includes(q));
  const el = document.getElementById('circuits-list');
  if (!list.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">⚡</div><div class="empty-text">Nessun circuito salvato.<br>Creane uno!</div></div>';
    return;
  }
  el.innerHTML = list.map(c => {
    const canBuild = canBuildCircuit(c);
    const ings = (c.ingredients||[]).map(ing => {
      const comp = inventory.find(x => x.id === ing.compId);
      const avail = comp ? comp.qty : 0;
      const cls = avail >= ing.qty ? 'ok' : avail > 0 ? 'low' : 'no';
      return `<div class="circuit-ingredient">
        <span class="ci-qty">×${ing.qty}</span>
        <span class="ci-name">${comp ? comp.name : '<em style="color:var(--text-dim)">Componente rimosso</em>'}</span>
        <span class="ci-avail ${cls}">${avail} disp.</span>
      </div>`;
    }).join('');
    return `
    <div class="circuit-card" id="cc-${c.id}">
      <div class="circuit-header" onclick="toggleCircuit(${c.id})">
        <div class="circuit-icon">${c.icon||'🔌'}</div>
        <div>
          <div class="circuit-name">${c.name}</div>
          <div class="circuit-meta">${(c.ingredients||[]).length} componenti · ${canBuild ? '<span style="color:var(--accent3)">✔ Producibile</span>' : '<span style="color:var(--danger)">✘ Stock insufficiente</span>'}</div>
        </div>
        <span class="circuit-chevron">▶</span>
      </div>
      <div class="circuit-body">
        ${c.desc ? `<div style="font-size:12px;color:var(--text-dim);margin-bottom:10px;padding-top:8px;">${c.desc}</div>` : ''}
        ${ings}
        <div class="circuit-actions">
          <button class="btn btn-ghost" style="font-size:11px;" onclick="deleteCircuit(${c.id})">🗑 Elimina</button>
          <button class="btn ${canBuild ? 'btn-secondary' : 'btn-ghost'}" style="font-size:12px;" onclick="buildCircuit(${c.id})" ${canBuild?'':'disabled style="opacity:.4;pointer-events:none;"'}>⚡ Usa / Scarica</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleCircuit(id) {
  document.getElementById('cc-'+id).classList.toggle('open');
}

function filterCircuits() { renderCircuits(); }

function canBuildCircuit(c) {
  return (c.ingredients||[]).every(ing => {
    const comp = inventory.find(x => x.id === ing.compId);
    return comp && comp.qty >= ing.qty;
  });
}

function buildCircuit(id) {
  const c = circuits.find(x => x.id === id);
  if (!c) return;
  if (!canBuildCircuit(c)) { showToast('⚠️ Stock insufficiente!', 'warn'); return; }
  if (!confirm(`Scaricare i componenti per "${c.name}"?`)) return;
  c.ingredients.forEach(ing => {
    const comp = inventory.find(x => x.id === ing.compId);
    if (comp) { comp.qty -= ing.qty; }
  });
  save();
  addLog('out', `⚡ Circuito "${c.name}" prodotto — scaricati ${c.ingredients.length} tipi`);
  showToast(`⚡ "${c.name}" → stock aggiornato!`);
  renderCircuits();
}

function deleteCircuit(id) {
  const c = circuits.find(x => x.id === id);
  if (!confirm(`Eliminare il circuito "${c.name}"?`)) return;
  circuits = circuits.filter(x => x.id !== id);
  save();
  renderCircuits();
}

// ─── CIRCUIT MODAL ─────────────────────────────────────────────────────────
function openCircuitModal() {
  document.getElementById('c-name').value = '';
  document.getElementById('c-icon').value = '🔌';
  document.getElementById('c-desc').value = '';
  document.getElementById('ing-list').innerHTML = '';
  addIngredientRow();
  document.getElementById('circuit-modal').classList.add('open');
}
function closeCircuitModal() {
  document.getElementById('circuit-modal').classList.remove('open');
}

function addIngredientRow() {
  const opts = inventory.map(c => `<option value="${c.id}">${c.name}${c.val?' ('+c.val+')':''}</option>`).join('');
  const row = document.createElement('div');
  row.className = 'ing-row';
  row.innerHTML = `
    <select style="flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:8px;font-family:var(--sans);font-size:13px;outline:none;">
      ${opts||'<option>— Nessun componente —</option>'}
    </select>
    <input type="number" min="1" value="1" style="width:58px;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:8px;font-family:var(--mono);font-size:14px;text-align:center;outline:none;">
    <button class="del-btn" onclick="this.parentNode.remove()">✕</button>
  `;
  document.getElementById('ing-list').appendChild(row);
}

function saveCircuit() {
  const name = document.getElementById('c-name').value.trim();
  const icon = document.getElementById('c-icon').value.trim() || '🔌';
  const desc = document.getElementById('c-desc').value.trim();
  if (!name) { showToast('❌ Nome obbligatorio!', 'error'); return; }
  const rows = document.querySelectorAll('#ing-list .ing-row');
  const ingredients = [];
  rows.forEach(row => {
    const sel = row.querySelector('select');
    const inp = row.querySelector('input');
    if (sel && inp && sel.value) {
      ingredients.push({ compId: parseInt(sel.value), qty: parseInt(inp.value)||1 });
    }
  });
  if (!ingredients.length) { showToast('❌ Aggiungi almeno un componente!', 'error'); return; }
  circuits.push({ id: nextId++, name, icon, desc, ingredients });
  save();
  addLog('in', `Circuito "${name}" salvato`);
  closeCircuitModal();
  renderCircuits();
  showToast(`✅ Circuito "${name}" salvato!`);
}

// ─── LOG ───────────────────────────────────────────────────────────────────
function renderLog() {
  const el = document.getElementById('log-list');
  if (!log.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Nessun movimento registrato</div></div>';
    return;
  }
  el.innerHTML = log.map(e => `
    <div class="log-entry">
      <div class="log-dot ${e.type}"></div>
      <div>
        <div class="log-text">${e.msg}</div>
        <div class="log-time">${e.ts}</div>
      </div>
    </div>
  `).join('');
}
function clearLog() {
  if (!confirm('Svuotare il log?')) return;
  log = []; save(); renderLog();
}

// ─── CATEGORIES ────────────────────────────────────────────────────────────
function addCategory() {
  const icon = document.getElementById('nc-icon').value.trim() || '⚫';
  const name = document.getElementById('nc-name').value.trim();
  if (!name) { showToast('❌ Inserisci il nome!', 'error'); return; }
  const key = name.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'') + '_' + Date.now();
  customCats.push({ key, icon, name });
  save();
  document.getElementById('nc-icon').value = '';
  document.getElementById('nc-name').value = '';
  renderCatsPage();
  rebuildCatSelects();
  showToast(`✅ Categoria "${name}" aggiunta!`);
}
function deleteCategory(key) {
  const used = inventory.some(c => c.cat === key);
  if (used && !confirm('Questa categoria è usata da alcuni componenti. Eliminarla comunque?')) return;
  customCats = customCats.filter(c => c.key !== key);
  save();
  renderCatsPage();
  rebuildCatSelects();
}
function renderCatsPage() {
  const el = document.getElementById('cats-list');
  const all = allCatOptions();
  el.innerHTML = all.map(c => {
    const isCustom = customCats.find(x => x.key === c.key);
    return `<div class="cat-manage-row">
      <div class="cat-manage-icon">${c.icon}</div>
      <div class="cat-manage-name">${c.name}</div>
      ${isCustom ? `<button class="cat-manage-del" onclick="deleteCategory('${c.key}')">🗑</button>` : '<span style="font-size:10px;color:var(--text-dim);font-family:var(--mono)">BASE</span>'}
    </div>`;
  }).join('');
}
function rebuildCatSelects() {
  const opts = allCatOptions().map(o => `<option value="${o.key}" style="background:var(--surface2)">${o.icon} ${o.name}</option>`).join('');
  const fcat = document.getElementById('f-cat');
  if (fcat) fcat.innerHTML = opts;
}

// ─── INIT ──────────────────────────────────────────────────────────────────
async function init() {
  showSyncStatus('syncing');
  const fromCloud = await loadFromCloud();
  if (!fromCloud && inventory.length === 0) {
    loadDemo();
  }
  rebuildCatSelects();
  renderInventory();
  renderStats();
  renderCatFilter();
  // Auto-refresh ogni 30 secondi
  setInterval(async () => {
    const data = await sbGet();
    if (data) {
      inventory = data.inventory || [];
      circuits = data.circuits || [];
      log = data.log || [];
      nextId = data.nextId || nextId;
      customCats = data.customCats || [];
      rebuildCatSelects();
      renderInventory();
      renderStats();
      renderCatFilter();
      showSyncStatus('ok');
    }
  }, 30000);
}

// ─── SERVICE WORKER ────────────────────────────────────────────────────────
const SW_CODE = `
const CACHE = 'electrostock-v1';
const ASSETS = [self.location.pathname];
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys =>
    Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
  ));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  e.respondWith(
    caches.match(e.request).then(r => r || fetch(e.request).catch(() => caches.match(e.request)))
  );
});
`;

if ('serviceWorker' in navigator) {
  const blob = new Blob([SW_CODE], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}

function installApp() {
  if (!deferredPrompt) return;

    deferredPrompt = null;
    const b = document.getElementById('install-banner');
    if (b) b.remove();
  });
}
